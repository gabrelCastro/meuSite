services:
  app:
    build: .
    image: meusite:main-latest
    container_name: meuSite
    restart: unless-stopped
    ports:
      - "${PORT:-3003}:3003"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-meusite}
      NODE_ENV: production
    volumes:
      - uploads_data:/app/public/uploads
    networks:
      - rede-meuSite
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: meuSite-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-meusite}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rede-meuSite
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-meusite}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pg-backup:
    image: prodrigestivill/postgres-backup-local:16-alpine
    container_name: meuSite-backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-meusite}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 2
      BACKUP_KEEP_WEEKS: 0
      BACKUP_KEEP_MONTHS: 0
      HEALTHCHECK_PORT: 8080
    volumes:
      - ./backups:/backups
    networks:
      - rede-meuSite
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  rede-meuSite:
    driver: bridge
